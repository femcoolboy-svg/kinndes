<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinders — Чат, группы, звонки</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body.dark {
            --bg-primary: #0f1117;
            --bg-card: #1e2229;
            --bg-input: #15181e;
            --text-primary: #e8edf5;
            --text-secondary: #9aa4bf;
            --border: #2a2f3a;
            --accent: #f5a623;
            --divider: #2a2f3a;
            --shadow: 0 8px 32px rgba(0,0,0,0.25);
        }
        body.light {
            --bg-primary: #f5f7fc;
            --bg-card: #ffffff;
            --bg-input: #f0f2f8;
            --text-primary: #2c2f36;
            --text-secondary: #5e647a;
            --border: #e2e6ef;
            --accent: #f5a623;
            --divider: #e2e6ef;
            --shadow: 0 8px 28px rgba(0,0,0,0.06);
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: system-ui, sans-serif;
            transition: background 0.3s;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 28px; font-weight: bold; color: var(--accent); }
        .user-area { display: flex; gap: 20px; align-items: center; }
        .theme-btn, .logout-btn { background: var(--bg-input); border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        .logout-btn { background: #ff6b6b; color: white; }
        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 20px;
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .friends-panel, .profile-panel {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid var(--border);
            height: calc(100vh - 100px);
            overflow-y: auto;
        }
        .friends-panel { animation: slideFromLeft 0.5s; }
        .profile-panel { animation: slideFromRight 0.5s; }
        @keyframes slideFromLeft { from { opacity: 0; transform: translateX(-60px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideFromRight { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
        .chat-area {
            background: var(--bg-card);
            border-radius: 28px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 100px);
            animation: slideFromBottom 0.5s;
        }
        @keyframes slideFromBottom { from { opacity: 0; transform: translateY(60px); } to { opacity: 1; transform: translateY(0); } }
        .panel-title { font-size: 12px; text-transform: uppercase; margin: 16px 0 12px; color: var(--text-secondary); }
        .divider { height: 1px; background: var(--divider); margin: 16px 0; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex:1; padding: 10px; background: var(--bg-input); border:1px solid var(--border); border-radius:20px; color: var(--text-primary); }
        .search-box button { background: var(--accent); border:none; padding:10px 16px; border-radius:20px; cursor:pointer; }
        .list-item {
            background: var(--bg-input);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .list-item:hover { background: var(--border); transform: translateX(4px); }
        .friend-name { font-weight: 600; }
        .friend-tag { font-size: 11px; color: var(--text-secondary); }
        .btn-small { padding: 4px 12px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; }
        .btn-success { background: #6bdd8c; color: #1a1a2e; }
        .btn-danger { background: #ff6b6b; color: white; }
        .profile-header { text-align: center; margin-bottom: 20px; }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            overflow: hidden;
            cursor: pointer;
        }
        .profile-avatar img, .profile-avatar video { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 20px; font-weight: bold; }
        .profile-tag { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
        .profile-bio { font-size: 13px; background: var(--bg-input); padding: 8px; border-radius: 20px; margin: 10px 0; }
        .premium-badge { display: inline-block; background: linear-gradient(135deg,#FFD700,#FFA500); border-radius: 50px; padding: 2px 10px; font-size: 12px; margin-left: 8px; }
        .profile-stats { display: flex; justify-content: space-around; margin: 16px 0; padding: 10px; background: var(--bg-input); border-radius: 20px; }
        .stat { text-align: center; }
        .stat-value { font-weight: bold; font-size: 18px; }
        .stat-label { font-size: 11px; color: var(--text-secondary); }
        .profile-btn {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .profile-btn-primary { background: var(--accent); color: #1a1a2e; }
        .profile-btn-secondary { background: var(--bg-input); color: var(--text-primary); }
        .profile-btn-danger { background: #ff6b6b; color: white; }
        .profile-btn-plus { background: linear-gradient(135deg, #FFD700, #FFA500); color: #1a1a2e; }
        .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .call-header-btn { background: var(--accent); border: none; border-radius: 30px; padding: 6px 12px; cursor: pointer; font-size: 14px; }
        .messages { flex:1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 70%; padding: 10px 18px; border-radius: 24px; }
        .message-own { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 6px; }
        .message-other { align-self: flex-start; background: var(--bg-input); border-bottom-left-radius: 6px; }
        .input-area { display: flex; gap: 12px; padding: 16px 20px; border-top: 1px solid var(--border); }
        .input-area input { flex:1; padding: 12px; background: var(--bg-input); border:1px solid var(--border); border-radius:30px; color: var(--text-primary); }
        .input-area button { background: var(--accent); border:none; padding:12px 24px; border-radius:30px; cursor:pointer; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80%;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 16px; }
        .friend-select-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            margin: 6px 0;
            background: var(--bg-input);
            border-radius: 20px;
            cursor: pointer;
        }
        .friend-select-item.selected { background: var(--accent); color: #1a1a2e; }
        .friend-avatar-small { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hidden { display: none; }
        .error { color: #ff6b6b; }
        .text-center { text-align: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .call-modal { background: #1e2229; border-radius: 40px; padding: 30px; text-align: center; min-width: 300px; }
        .call-modal button { margin: 10px; padding: 10px 20px; border-radius: 40px; border: none; cursor: pointer; }
        @media (max-width: 1000px) {
            .main-grid { grid-template-columns: 1fr; gap: 16px; }
            .friends-panel, .profile-panel { height: auto; max-height: 350px; }
        }
    </style>
</head>
<body class="dark">
<div class="header">
    <div class="logo">🐻 Kinders</div>
    <div class="user-area">
        <span id="currentUsername"></span>
        <button class="theme-btn" id="themeSun">☀️</button>
        <button class="theme-btn" id="themeMoon">🌙</button>
        <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
</div>

<div class="main-grid">
    <div class="friends-panel">
        <div class="search-box"><input id="searchInput" placeholder="Поиск друзей..."><button id="searchBtn">Найти</button></div>
        <div id="searchResults" class="list"></div>
        <div class="divider"></div>
        <div class="panel-title">📨 ЗАПРОСЫ В ДРУЗЬЯ</div>
        <div id="requestsList" class="list"></div>
        <div class="divider"></div>
        <div class="panel-title">👥 ДРУЗЬЯ <span id="friendsLimit"></span></div>
        <div id="friendsList" class="list"></div>
        <div class="divider"></div>
        <div class="panel-title">💬 ГРУППЫ</div>
        <button id="createGroupBtn" style="width:100%; margin-bottom:12px; background:var(--accent); border:none; padding:8px; border-radius:20px;">➕ Создать группу</button>
        <div id="groupsList" class="list"></div>
        <div id="adminPanel" class="hidden" style="margin-top:20px;">
            <div class="divider"></div>
            <div class="panel-title">👑 АДМИН</div>
            <button id="allUsersBtn" style="width:100%; background:#ff6b6b; border:none; padding:8px; border-radius:20px;">Все пользователи</button>
            <div id="usersList" class="list hidden mt-2"></div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chatTitle">
            <span>💬 Выберите друга или группу</span>
            <button id="callBtn" class="call-header-btn hidden">📞 Звонок</button>
        </div>
        <div id="messages" class="messages"><div class="text-center" style="margin-top:40px;">👈 Нажмите на друга</div></div>
        <div class="input-area"><input id="messageInput" placeholder="Сообщение..."><button id="sendMsgBtn">Отправить</button></div>
    </div>

    <div class="profile-panel">
        <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar">👤</div>
            <div class="profile-name" id="profileName"></div>
            <div class="profile-tag" id="profileTag"></div>
            <div class="profile-bio" id="profileBio">Био: пока пусто</div>
            <div id="premiumStatus" class="premium-badge hidden">⭐ Kinders+</div>
        </div>
        <div class="profile-stats">
            <div class="stat"><div class="stat-value" id="friendsCount">0</div><div class="stat-label">друзей</div></div>
            <div class="stat"><div class="stat-value" id="groupsCount">0</div><div class="stat-label">групп</div></div>
            <div class="stat"><div class="stat-value" id="regDate">—</div><div class="stat-label">регистрация</div></div>
        </div>
        <button class="profile-btn profile-btn-primary" id="changeUsernameBtn">✏️ Сменить ник</button>
        <div id="premiumSettingsBlock" class="hidden">
            <button class="profile-btn profile-btn-secondary" id="changeNickColorBtn">🎨 Цвет ника (Plus)</button>
            <button class="profile-btn profile-btn-secondary" id="setAnimatedAvatarBtn">🖼️ GIF-аватарка (Plus)</button>
            <button class="profile-btn profile-btn-secondary" id="setVideoBannerBtn">🎥 Видео-баннер (Plus)</button>
            <button class="profile-btn profile-btn-secondary" id="selectBadgeBtn">🏷️ Выбрать значок (Plus)</button>
        </div>
        <button class="profile-btn profile-btn-plus" id="buyPremiumBtn">💎 Купить Kinders+</button>
        <button class="profile-btn profile-btn-danger" id="logoutProfileBtn">🚪 Выйти</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let currentUser = null, currentChatType = null, currentChatId = null, socket = null;
    let currentPremium = false;
    let currentSettings = {};
    let friendsList = [];
    let groupsList = [];

    // WebRTC звонки
    let localStream = null;
    let peerConnection = null;
    let callActive = false;
    let currentCallTarget = null;

    const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    // Тема
    function setTheme(theme) {
        if(theme==='light'){ document.body.classList.remove('dark'); document.body.classList.add('light'); localStorage.setItem('theme','light'); }
        else { document.body.classList.remove('light'); document.body.classList.add('dark'); localStorage.setItem('theme','dark'); }
    }
    setTheme(localStorage.getItem('theme')||'dark');
    document.getElementById('themeSun').onclick=()=>setTheme('light');
    document.getElementById('themeMoon').onclick=()=>setTheme('dark');

    // Проверка сессии
    async function checkSession() {
        const res=await fetch('/session');
        const data=await res.json();
        if(data.success && data.user) {
            currentUser=data.user;
            currentPremium=data.isPremium || false;
            currentSettings=data.settings || {};
            document.getElementById('currentUsername').innerText=currentUser.username;
            updateProfileUI();
            initSocket();
            loadFriends();
            loadRequests();
            loadGroups();
            if(currentUser.username==='prisanok') document.getElementById('adminPanel').classList.remove('hidden');
            if(currentPremium) {
                document.getElementById('premiumStatus').classList.remove('hidden');
                document.getElementById('premiumSettingsBlock').classList.remove('hidden');
                if(currentSettings.nickColor) {
                    document.getElementById('profileName').style.color = currentSettings.nickColor;
                    document.getElementById('currentUsername').style.color = currentSettings.nickColor;
                }
                if(currentSettings.animatedAvatar) {
                    const avatarDiv = document.getElementById('profileAvatar');
                    avatarDiv.innerHTML = `<video autoplay loop muted playsinline src="${currentSettings.animatedAvatar}" style="width:100%;height:100%;object-fit:cover;"></video>`;
                }
                if(currentSettings.videoBanner) {
                    document.body.style.backgroundImage = `url(${currentSettings.videoBanner})`;
                    document.body.style.backgroundSize = 'cover';
                }
                if(currentSettings.plusBadge) {
                    const badgeSpan = document.createElement('span');
                    badgeSpan.className = 'premium-badge';
                    badgeSpan.innerText = currentSettings.plusBadge;
                    document.getElementById('profileName').appendChild(badgeSpan);
                }
            }
        } else window.location.href='login.html';
    }

    function updateProfileUI() {
        document.getElementById('profileName').innerText = currentUser.username;
        document.getElementById('profileTag').innerText = `#${currentUser.tag}`;
        if(currentUser.created_at) {
            const date = new Date(currentUser.created_at).toLocaleDateString();
            document.getElementById('regDate').innerText = date;
        }
        if(currentUser.avatar) {
            document.getElementById('profileAvatar').innerHTML = `<img src="${currentUser.avatar}">`;
        }
    }

    // Сокет
    function initSocket() {
        socket=io();
        socket.on('connect',()=>{ if(currentUser) socket.emit('register',currentUser.id); });
        socket.on('private-message',(data)=>{
            if(currentChatType==='private' && currentChatId===data.from) appendMessage(data.msg,false,data.time);
            else showNotification(data.fromName,data.msg);
            loadFriends();
        });
        socket.on('group-message',(data)=>{
            if(currentChatType==='group' && currentChatId===data.group) appendMessage(data.msg,false,data.time);
            else showNotification(data.groupName||'Группа',data.msg);
        });

        // Звонки
        socket.on('call-made', async (data) => {
            const { from, offer } = data;
            const fromUser = friendsList.find(f => f.id === from) || { username: 'Неизвестный' };
            if (confirm(`Входящий звонок от ${fromUser.username}. Ответить?`)) {
                await startCall(from, true);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                socket.emit('call-answer', { to: from, answer });
                showCallUI(fromUser.username);
            } else {
                socket.emit('end-call', { to: from });
            }
        });
        socket.on('call-answered', async (data) => {
            const { from, answer } = data;
            if (peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            }
        });
        socket.on('ice-candidate', async (data) => {
            if (peerConnection) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });
        socket.on('call-ended', () => {
            endCall();
            alert('Звонок завершён');
        });
    }

    async function startCall(targetId, isAnswer = false) {
        if (callActive) endCall();
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            peerConnection = new RTCPeerConnection(configuration);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice-candidate', { to: targetId, candidate: event.candidate });
                }
            };
            if (!isAnswer) {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                socket.emit('call-user', { to: targetId, offer });
            }
            callActive = true;
            currentCallTarget = targetId;
        } catch(e) { alert('Не удалось получить доступ к микрофону'); }
    }

    function endCall() {
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        callActive = false;
        if (currentCallTarget) socket.emit('end-call', { to: currentCallTarget });
        currentCallTarget = null;
        const callModal = document.getElementById('callModal');
        if (callModal) callModal.remove();
    }

    function showCallUI(peerName) {
        let modal = document.getElementById('callModal');
        if (modal) modal.remove();
        modal = document.createElement('div');
        modal.id = 'callModal';
        modal.className = 'modal';
        modal.innerHTML = `<div class="call-modal">
            <h3>📞 Звонок с ${peerName}</h3>
            <button id="endCallBtn" style="background:#ff6b6b;">Завершить</button>
        </div>`;
        document.body.appendChild(modal);
        document.getElementById('endCallBtn').onclick = () => { endCall(); modal.remove(); };
    }

    function appendMessage(text,isOwn,time){
        const div=document.createElement('div');
        div.className=`message ${isOwn?'message-own':'message-other'}`;
        div.innerHTML=`${escapeHtml(text)}<div class="message-time">${new Date(time).toLocaleTimeString()}</div>`;
        document.getElementById('messages').appendChild(div);
        div.scrollIntoView();
    }
    function showNotification(sender,msg){
        const n=document.createElement('div');
        n.className='message message-other';
        n.style.position='fixed'; n.style.bottom='20px'; n.style.right='20px'; n.style.maxWidth='250px'; n.style.zIndex='999';
        n.innerHTML=`<strong>${escapeHtml(sender)}</strong><br>${escapeHtml(msg.substring(0,50))}`;
        document.body.appendChild(n);
        setTimeout(()=>n.remove(),3000);
    }

    // Друзья
    async function loadFriends(){
        const res=await fetch('/friends',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
        const data=await res.json();
        friendsList = data.friends;
        const container=document.getElementById('friendsList');
        container.innerHTML='';
        document.getElementById('friendsCount').innerText = data.friends.length;
        document.getElementById('friendsLimit').innerHTML = `(${data.friends.length}/${data.maxFriends})`;
        data.friends.forEach(f=>{
            const div=document.createElement('div');
            div.className='list-item';
            div.onclick=()=>{ currentChatType='private'; currentChatId=f.id; document.getElementById('chatTitle').innerHTML=`💬 Чат с ${escapeHtml(f.username)}`; document.getElementById('callBtn').classList.remove('hidden'); loadPrivateMessages(); };
            let nameStyle = f.nickColor ? `style="color:${f.nickColor}"` : '';
            let badgeHtml = f.plusBadge ? `<span class="premium-badge" style="margin-left:5px;">${f.plusBadge}</span>` : '';
            div.innerHTML=`<div><div class="friend-name" ${nameStyle}>${escapeHtml(f.username)}${badgeHtml}</div><div class="friend-tag">#${f.tag}</div></div>`;
            container.appendChild(div);
        });
    }
    async function loadRequests(){
        const res=await fetch('/requests',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
        const data=await res.json();
        const container=document.getElementById('requestsList');
        container.innerHTML='';
        data.requests.forEach(r=>{
            const div=document.createElement('div');
            div.className='list-item';
            div.innerHTML=`<span>${escapeHtml(r.username)}#${r.tag}</span><div><button class="btn-small btn-success" onclick="acceptReq(${r.id})">✅</button><button class="btn-small btn-danger" onclick="declineReq(${r.id})">❌</button></div>`;
            container.appendChild(div);
        });
    }
    async function loadGroups(){
        const res=await fetch('/groups',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
        const data=await res.json();
        groupsList = data.groups;
        const container=document.getElementById('groupsList');
        container.innerHTML='';
        document.getElementById('groupsCount').innerText = data.groups.length;
        data.groups.forEach(g=>{
            const div=document.createElement('div');
            div.className='list-item';
            div.onclick=()=>{ currentChatType='group'; currentChatId=g.id; document.getElementById('chatTitle').innerHTML=`💬 Группа: ${escapeHtml(g.name)} (${g.membersCount} уч.)`; document.getElementById('callBtn').classList.remove('hidden'); loadGroupMessages(); };
            div.innerHTML=`<div class="flex-between"><div class="friend-name">${escapeHtml(g.name)}</div>${g.owner_id === currentUser.id ? '<span class="btn-small" style="background:#f5a623;">👑</span>' : ''}</div>`;
            container.appendChild(div);
        });
    }
    async function loadPrivateMessages(){
        if(!currentChatId) return;
        const res=await fetch('/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({u2:currentChatId})});
        const data=await res.json();
        const container=document.getElementById('messages');
        container.innerHTML='';
        data.messages.forEach(m=>{
            const isOwn=m.from_user_id===currentUser.id;
            const div=document.createElement('div');
            div.className=`message ${isOwn?'message-own':'message-other'}`;
            div.innerHTML=`${escapeHtml(m.message)}<div class="message-time">${new Date(m.timestamp).toLocaleTimeString()}</div>`;
            container.appendChild(div);
        });
        container.scrollTop=container.scrollHeight;
    }
    async function loadGroupMessages(){
        if(!currentChatId) return;
        const res=await fetch('/group/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({groupId:currentChatId})});
        const data=await res.json();
        const container=document.getElementById('messages');
        container.innerHTML='';
        data.messages.forEach(m=>{
            const isOwn=m.from_user_id===currentUser.id;
            const div=document.createElement('div');
            div.className=`message ${isOwn?'message-own':'message-other'}`;
            div.innerHTML=`<strong>${escapeHtml(m.fromName)}:</strong> ${escapeHtml(m.message)}<div class="message-time">${new Date(m.timestamp).toLocaleTimeString()}</div>`;
            container.appendChild(div);
        });
        container.scrollTop=container.scrollHeight;
    }
    async function sendMessage(){
        const msg=document.getElementById('messageInput').value.trim();
        if(!msg||!currentChatId) return;
        if(currentChatType==='private'){
            appendMessage(msg,true,new Date());
            socket.emit('private-message',{from:currentUser.id,to:currentChatId,msg,fromName:currentUser.username});
            await fetch('/send-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to_user_id:currentChatId,message:msg})});
        } else if(currentChatType==='group'){
            appendMessage(msg,true,new Date());
            socket.emit('group-message',{group:currentChatId,from:currentUser.id,fromName:currentUser.username,msg});
            await fetch('/group/send-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({group_id:currentChatId,message:msg})});
        }
        document.getElementById('messageInput').value='';
    }

    // Поиск
    document.getElementById('searchBtn').onclick=async()=>{
        const q=document.getElementById('searchInput').value;
        if(!q) return;
        const res=await fetch('/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({q})});
        const data=await res.json();
        const container=document.getElementById('searchResults');
        container.innerHTML='';
        if(data.users.length){
            data.users.forEach(u=>{
                const div=document.createElement('div');
                div.className='list-item';
                div.innerHTML=`<span>${escapeHtml(u.username)}#${u.tag}</span><button class="btn-small btn-success" onclick="addFriend(${u.id})">➕</button>`;
                container.appendChild(div);
            });
        } else container.innerHTML='<span class="error">❌ Не найден</span>';
    };
    window.addFriend=async(id)=>{
        const res=await fetch('/friend/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:id})});
        const data=await res.json();
        if(data.success){ document.getElementById('searchResults').innerHTML='<span class="success">✅ Запрос отправлен</span>'; loadRequests(); }
        else alert('❌ '+data.error);
    };
    window.acceptReq=async(id)=>{ await fetch('/friend/accept',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})}); loadFriends(); loadRequests(); };
    window.declineReq=async(id)=>{ await fetch('/friend/decline',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})}); loadRequests(); };

    // Создание группы (модальное окно с выбором друзей)
    document.getElementById('createGroupBtn').onclick=async()=>{
        // Получаем список друзей
        const res=await fetch('/friends',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
        const data=await res.json();
        const availableFriends = data.friends;
        if(availableFriends.length < 1) { alert('У вас нет друзей, чтобы создать группу'); return; }
        const maxMembers = currentPremium ? 20 : 9;
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content">
            <h3>Создать группу</h3>
            <input type="text" id="groupName" placeholder="Название группы" style="width:100%; margin-bottom:16px;">
            <div id="friendsForGroup" style="max-height:300px; overflow-y:auto;"></div>
            <div class="flex-between" style="margin-top:16px;">
                <button id="confirmCreateGroup" class="profile-btn-primary">Создать</button>
                <button id="cancelGroupModal" class="profile-btn-secondary">Отмена</button>
            </div>
            <div id="groupCreateMsg" class="error"></div>
        </div>`;
        document.body.appendChild(modal);
        const container = document.getElementById('friendsForGroup');
        const selected = [];
        availableFriends.forEach(f => {
            const div = document.createElement('div');
            div.className = 'friend-select-item';
            div.innerHTML = `<div class="friend-avatar-small">${f.avatar ? `<img src="${f.avatar}">` : f.username[0]}</div>
                            <span>${escapeHtml(f.username)}#${f.tag}</span>
                            <button class="btn-small btn-success" data-id="${f.id}">+</button>`;
            const btn = div.querySelector('button');
            btn.onclick = (e) => {
                e.stopPropagation();
                if(selected.includes(f.id)) return;
                if(selected.length >= maxMembers-1) { alert(`Максимум участников: ${maxMembers}`); return; }
                selected.push(f.id);
                btn.innerText = '✓';
                btn.classList.remove('btn-success');
                btn.classList.add('btn-secondary');
            };
            container.appendChild(div);
        });
        document.getElementById('confirmCreateGroup').onclick = async () => {
            const name = document.getElementById('groupName').value.trim();
            if(!name) { document.getElementById('groupCreateMsg').innerText = 'Введите название'; return; }
            if(selected.length < 1) { document.getElementById('groupCreateMsg').innerText = 'Выберите хотя бы одного друга (с вами будет минимум 2)'; return; }
            const createRes = await fetch('/group/create', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({ name, memberIds: selected })
            });
            const createData = await createRes.json();
            if(createData.success) {
                modal.remove();
                loadGroups();
            } else {
                document.getElementById('groupCreateMsg').innerText = createData.error;
            }
        };
        document.getElementById('cancelGroupModal').onclick = () => modal.remove();
    };

    // Кик из группы (только для создателя) - при клике на группу добавим контекстное меню
    async function kickFromGroup(groupId, targetUserId) {
        const res = await fetch('/group/kick', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ groupId, targetUserId })
        });
        const data = await res.json();
        if(data.success) {
            alert('Пользователь исключён');
            loadGroups();
            if(currentChatId === groupId) loadGroupMessages();
        } else {
            alert(data.error);
        }
    }

    // Звонок
    document.getElementById('callBtn').onclick = () => {
        if(!currentChatId) return;
        if(currentChatType === 'private') {
            startCall(currentChatId);
            const friend = friendsList.find(f => f.id === currentChatId);
            if(friend) showCallUI(friend.username);
        } else {
            alert('Групповые звонки пока не реализованы');
        }
    };

    // Профиль
    document.getElementById('changeUsernameBtn').onclick = async () => {
        const newName = prompt('Новый ник (3-20 символов):');
        if(!newName || newName.length<3) return;
        const res = await fetch('/change-username', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ newUsername: newName }) });
        const data = await res.json();
        if(data.success) location.reload();
        else alert(data.error);
    };
    document.getElementById('buyPremiumBtn').onclick = async () => {
        const plan = prompt('Выберите тариф:\nweek - 49₽ (7 дней)\nmonth - 149₽ (30 дней)\nyear - 1290₽ (365 дней)\nforever - 4990₽ (навсегда)');
        if(!plan) return;
        const res = await fetch('/buy-premium', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ plan }) });
        const data = await res.json();
        if(data.success) { alert('Подписка активирована! Перезагрузите страницу.'); location.reload(); }
        else alert('Ошибка: '+data.error);
    };
    document.getElementById('changeNickColorBtn').onclick = async () => {
        const color = prompt('Введите HEX цвет (например #ff0000):', '#f5a623');
        if(color) { await fetch('/save-premium-settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ nickColor: color }) }); location.reload(); }
    };
    document.getElementById('setAnimatedAvatarBtn').onclick = async () => {
        const url = prompt('Введите прямую ссылку на GIF:');
        if(url) { await fetch('/save-premium-settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ animatedAvatar: url }) }); location.reload(); }
    };
    document.getElementById('setVideoBannerBtn').onclick = async () => {
        const url = prompt('Введите прямую ссылку на MP4 видео для баннера:');
        if(url) { await fetch('/save-premium-settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ videoBanner: url }) }); location.reload(); }
    };
    document.getElementById('selectBadgeBtn').onclick = async () => {
        const badge = prompt('Выберите значок: ⭐ 💎 👑 🔥 🎨');
        if(badge) { await fetch('/save-premium-settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ plusBadge: badge }) }); location.reload(); }
    };

    document.getElementById('logoutBtn').onclick = async () => { await fetch('/logout',{method:'POST'}); window.location.href='login.html'; };
    document.getElementById('logoutProfileBtn').onclick = async () => { await fetch('/logout',{method:'POST'}); window.location.href='login.html'; };
    document.getElementById('sendMsgBtn').onclick = sendMessage;
    document.getElementById('messageInput').addEventListener('keypress',(e)=>{ if(e.key==='Enter') sendMessage(); });

    // Админка
    async function loadAllUsers() {
        const res = await fetch('/all-users');
        const data = await res.json();
        const container = document.getElementById('usersList');
        container.innerHTML = '';
        data.users.forEach(u => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span>${escapeHtml(u.username)}#${u.tag}</span><button class="btn-small btn-danger" data-id="${u.id}">Бан</button>`;
            div.querySelector('button').onclick = async () => {
                await fetch('/ban', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ userId: u.id }) });
                alert('Забанен');
                loadAllUsers();
            };
            container.appendChild(div);
        });
        container.classList.remove('hidden');
    }
    document.getElementById('allUsersBtn').onclick = () => {
        const container = document.getElementById('usersList');
        if(container.classList.contains('hidden')) loadAllUsers();
        else container.classList.add('hidden');
    };

    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g,m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    checkSession();
</script>
</body>
</html>
