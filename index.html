<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinders — общайся свободно</title>
    <style>
        /* ... все стили без изменений (оставьте как в прошлый раз) ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body.dark { --bg-primary: #0f1117; --bg-card: #1e2229; --bg-input: #15181e; --text-primary: #e8edf5; --text-secondary: #9aa4bf; --border: #2a2f3a; --accent: #f5a623; --divider: #2a2f3a; }
        body.light { --bg-primary: #f5f7fc; --bg-card: #ffffff; --bg-input: #f0f2f8; --text-primary: #2c2f36; --text-secondary: #5e647a; --border: #e2e6ef; --accent: #f5a623; --divider: #e2e6ef; }
        body { background: var(--bg-primary); color: var(--text-primary); font-family: system-ui, sans-serif; transition: background 0.3s; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px; background: var(--bg-card); border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 28px; font-weight: bold; color: var(--accent); cursor: pointer; }
        .user-area { display: flex; gap: 20px; align-items: center; }
        .theme-btn, .logout-btn { background: var(--bg-input); border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        .logout-btn { background: #ff6b6b; color: white; }
        /* остальные стили полностью идентичны предыдущей версии, поэтому я их не повторяю для краткости */
        /* ... (вставьте сюда все остальные стили из предыдущего index.html, они не изменились) ... */
    </style>
</head>
<body class="dark">
<div class="header">
    <div class="logo" onclick="location.href='index.html'">🐻 Kinders</div>
    <div class="user-area">
        <span id="currentUsername"></span>
        <button class="theme-btn" id="themeSun">☀️</button>
        <button class="theme-btn" id="themeMoon">🌙</button>
        <!-- Кнопка "Скачать" УДАЛЕНА -->
        <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
</div>

<!-- остальная разметка без изменений (все модальные окна, панели и т.д.) -->
<!-- ... -->

<script src="/socket.io/socket.io.js"></script>
<script>
    let currentUser = null, currentChatType = null, currentChatId = null, socket = null;
    let currentPremium = false, currentSettings = {};
    let localStream = null, peerConnection = null, callActive = false, callTarget = null;
    const servers = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    // --- функции темы, сокетов, звонков, сообщений (без изменений, как в предыдущей версии) ---
    // ... (вставьте сюда весь код функций из предыдущего index.html, кроме checkSession и updateProfileUI, которые мы модифицируем)
    // Вместо этого я покажу только изменённые части:

    // Изменённая функция checkSession – будет вызываться каждую секунду
    async function checkSession() {
        const res = await fetch('/session');
        const data = await res.json();
        if (data.success && data.user) {
            // Если пользователь изменился (например, вышел из сессии), перенаправляем
            if (!currentUser || currentUser.id !== data.user.id) {
                currentUser = data.user;
                currentPremium = data.isPremium;
                currentSettings = data.settings || {};
                document.getElementById('currentUsername').innerText = currentUser.username;
                updateProfileUI();
                initSocket(); // переинициализируем сокет
                loadFriends();
                loadRequests();
                loadGroups();
                if (currentUser.username === 'prisanok') document.getElementById('adminPanel').classList.remove('hidden');
                if (currentPremium) {
                    document.getElementById('premiumStatus').classList.remove('hidden');
                    document.getElementById('premiumSettingsBlock').classList.remove('hidden');
                    if (currentSettings.nickColor) {
                        document.getElementById('profileName').style.color = currentSettings.nickColor;
                        document.getElementById('currentUsername').style.color = currentSettings.nickColor;
                    }
                    if (currentSettings.animatedAvatar) {
                        document.getElementById('profileAvatar').innerHTML = `<video autoplay loop muted playsinline src="${currentSettings.animatedAvatar}" style="width:100%;height:100%;object-fit:cover;"></video>`;
                    }
                    if (currentSettings.videoBanner) {
                        document.body.style.backgroundImage = `url(${currentSettings.videoBanner})`;
                        document.body.style.backgroundSize = 'cover';
                    }
                    if (currentSettings.plusBadge) {
                        let b = document.createElement('span');
                        b.className = 'premium-badge';
                        b.innerText = currentSettings.plusBadge;
                        document.getElementById('profileName').appendChild(b);
                    }
                } else {
                    document.getElementById('premiumStatus').classList.add('hidden');
                    document.getElementById('premiumSettingsBlock').classList.add('hidden');
                }
            } else {
                // Обновляем только статус премиума и настройки (без перезагрузки всех данных)
                if (currentPremium !== data.isPremium) {
                    currentPremium = data.isPremium;
                    if (currentPremium) {
                        document.getElementById('premiumStatus').classList.remove('hidden');
                        document.getElementById('premiumSettingsBlock').classList.remove('hidden');
                    } else {
                        document.getElementById('premiumStatus').classList.add('hidden');
                        document.getElementById('premiumSettingsBlock').classList.add('hidden');
                    }
                    // При изменении премиума обновляем друзей и группы (лимиты могли измениться)
                    loadFriends();
                    loadGroups();
                }
                if (JSON.stringify(currentSettings) !== JSON.stringify(data.settings)) {
                    currentSettings = data.settings;
                    // обновить отображение ника, аватара и т.д.
                    updateProfileUI();
                }
            }
        } else {
            window.location.href = 'login.html';
        }
    }

    function updateProfileUI() {
        document.getElementById('profileName').innerText = currentUser.username;
        document.getElementById('profileTag').innerText = `#${currentUser.tag}`;
        if (currentUser.created_at) document.getElementById('regDate').innerText = new Date(currentUser.created_at).toLocaleDateString();
        if (currentUser.avatar) document.getElementById('profileAvatar').innerHTML = `<img src="${currentUser.avatar}">`;
        else document.getElementById('profileAvatar').innerHTML = '👤';
        if (currentPremium && currentSettings.plusBadge) {
            // добавляем значок к имени, если его ещё нет
            let nameDiv = document.getElementById('profileName');
            if (!nameDiv.querySelector('.premium-badge')) {
                let b = document.createElement('span');
                b.className = 'premium-badge';
                b.innerText = currentSettings.plusBadge;
                nameDiv.appendChild(b);
            }
        }
    }

    // --- Обработчик кнопки Kinders+ (вместо покупки) ---
    function showPremiumUnavailable() {
        alert('❌ Временно недоступно. Проект ещё не развит.\n\nПереходите на наш Discord-сервер: https://discord.gg/UH5eVw5ATG\n\nВ отдельном канале напишите свой ник и причину, почему вам должны выдать премиум. В течение 1 часа мы ответим вам в личные сообщения в Discord.');
    }

    // Привязываем событие к кнопке "Купить Kinders+" (в профиле)
    document.getElementById('showPremiumModalBtn')?.removeEventListener('click', showPremiumUnavailable);
    document.getElementById('showPremiumModalBtn')?.addEventListener('click', showPremiumUnavailable);

    // Также если есть модальное окно premiumModal – скрываем его или отключаем кнопки
    document.getElementById('premiumModal')?.remove();
    // Удаляем старую модалку, чтобы не сбивала с толку

    // Все остальные функции (loadFriends, loadGroups, sendMessage, startCall и т.д.) остаются без изменений.
    // Вставьте их сюда из предыдущего рабочего index.html (они идентичны).

    // --- ЗАПУСК АВТООБНОВЛЕНИЯ КАЖДУЮ СЕКУНДУ ---
    // Первый вызов
    checkSession();
    // Затем каждую секунду обновляем данные
    setInterval(() => {
        checkSession();
        // Дополнительно можно обновлять список друзей и групп, но checkSession уже вызывает loadFriends/loadGroups при изменении премиума.
        // Для полной синхронизации можно вызывать loadFriends() и loadGroups() каждую секунду, но это нагрузит сервер.
        // Ограничимся проверкой сессии.
    }, 1000);

    // Остальной код (инициализация, обработчики событий) – без изменений.
</script>
</body>
</html>
