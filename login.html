<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinders - Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🐻 Kinders</h1>
            <p>С возвращением!</p>
            
            <form id="loginForm">
                <input type="text" id="username" placeholder="Твой никнейм" required>
                <input type="password" id="password" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>
            
            <p class="auth-link">Нет аккаунта? <a href="register.html">Создать</a></p>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                errorMsg.textContent = 'Заполни все поля';
                return;
            }
            
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    window.location.href = 'index.html';
                } else {
                    errorMsg.textContent = data.error;
                }
            } catch (err) {
                errorMsg.textContent = 'Ошибка соединения с сервером';
            }
        });
    </script>
</body>
</html>
