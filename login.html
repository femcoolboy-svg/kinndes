<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinders — Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Живой анимированный фон */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0a0a15 100%);
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle at center, rgba(245, 166, 35, 0.15) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        .animated-bg::after {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 215, 0, 0.08) 0%, transparent 60%);
            animation: rotateReverse 25s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateReverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        /* Плавающие частицы */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(245, 166, 35, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Контейнер формы */
        .auth-container {
            background: rgba(30, 34, 41, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(245, 166, 35, 0.2);
            animation: fadeSlideUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transition: transform 0.3s;
        }

        .auth-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(245, 166, 35, 0.3);
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .fade-out {
            animation: fadeOut 0.5s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: scale(0.9);
                visibility: hidden;
            }
        }

        h1 {
            color: #f5a623;
            text-align: center;
            margin-bottom: 12px;
            font-size: 44px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(245, 166, 35, 0.3);
        }

        .subtitle {
            text-align: center;
            color: #9aa4bf;
            margin-bottom: 32px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(21, 24, 30, 0.9);
            border: 1px solid #2a2f3a;
            border-radius: 32px;
            color: #e8edf5;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #f5a623;
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.2);
            background: rgba(21, 24, 30, 1);
        }

        input::placeholder {
            color: #5e647a;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f5a623, #e67e22);
            border: none;
            border-radius: 32px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            color: #1a1a2e;
            transition: all 0.3s;
            margin-top: 16px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(229, 126, 34, 0.4);
        }

        .switch {
            text-align: center;
            margin-top: 24px;
            color: #9aa4bf;
        }

        .switch a {
            color: #f5a623;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .switch a:hover {
            color: #ffc107;
            text-decoration: underline;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            background: rgba(255, 107, 107, 0.1);
            padding: 8px;
            border-radius: 20px;
        }

        /* Дискорд ссылка */
        .discord-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .discord-link a {
            color: #5865F2;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .discord-link a:hover {
            color: #7983f5;
        }
    </style>
</head>
<body>
<div class="animated-bg"></div>
<div class="particles" id="particles"></div>

<div class="auth-container" id="authContainer">
    <h1>🐻 Kinders</h1>
    <div class="subtitle">Общайся свободно</div>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Никнейм" required autocomplete="username">
        <input type="password" id="password" placeholder="Пароль" required autocomplete="current-password">
        <button type="submit">Войти →</button>
    </form>

    <div class="switch">
        Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
    </div>

    <div class="discord-link">
        <a href="https://discord.gg/UH5eVw5ATG" target="_blank">
            💬 Наш Discord сервер
        </a>
    </div>

    <div id="errorMsg" class="error"></div>
</div>

<script>
    // Генерация плавающих частиц
    function createParticles() {
        const container = document.getElementById('particles');
        const particleCount = 50;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 6 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.animationDuration = `${Math.random() * 10 + 8}s`;
            particle.style.animationDelay = `${Math.random() * 5}s`;
            particle.style.opacity = Math.random() * 0.5;
            container.appendChild(particle);
        }
    }
    createParticles();

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const container = document.getElementById('authContainer');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            errorMsg.innerText = '❌ Заполните все поля';
            return;
        }

        try {
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                container.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);
            } else {
                errorMsg.innerText = '❌ ' + data.error;
                errorMsg.style.animation = 'none';
                setTimeout(() => errorMsg.style.animation = '', 10);
            }
        } catch {
            errorMsg.innerText = '❌ Ошибка соединения с сервером';
        }
    });
</script>
</body>
</html>
