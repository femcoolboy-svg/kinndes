<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinders — Регистрация</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            background: rgba(30, 34, 41, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            animation: fadeSlideUp 0.6s ease-out;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 { color: #f5a623; text-align: center; margin-bottom: 30px; font-size: 36px; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #1e2229;
            border: 1px solid #2a2f3a;
            border-radius: 30px;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f5a623, #e67e22);
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .switch { text-align: center; margin-top: 20px; color: #aaa; }
        .switch a { color: #f5a623; text-decoration: none; }
        .error { color: #ff6b6b; text-align: center; margin-top: 10px; }
        .fade-out {
            animation: fadeOut 0.4s forwards;
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: scale(0.95); visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="auth-container" id="authContainer">
    <h1>🐻 Kinders</h1>
    <form id="registerForm">
        <input type="text" id="username" placeholder="Никнейм" required>
        <input type="password" id="password" placeholder="Пароль (мин. 4 символа)" required>
        <input type="password" id="confirm" placeholder="Подтвердите пароль" required>
        <button type="submit">Создать аккаунт →</button>
    </form>
    <div class="switch">Уже есть аккаунт? <a href="login.html">Войти</a></div>
    <div id="errorMsg" class="error"></div>
</div>

<script>
    const form = document.getElementById('registerForm');
    const errorMsg = document.getElementById('errorMsg');
    const container = document.getElementById('authContainer');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        if (!username || !password) {
            errorMsg.innerText = 'Заполните все поля';
            return;
        }
        if (password !== confirm) {
            errorMsg.innerText = 'Пароли не совпадают';
            return;
        }
        if (password.length < 4) {
            errorMsg.innerText = 'Пароль минимум 4 символа';
            return;
        }
        try {
            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                container.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 400);
            } else {
                errorMsg.innerText = data.error;
            }
        } catch(err) {
            errorMsg.innerText = 'Ошибка соединения';
        }
    });
</script>
</body>
</html>
